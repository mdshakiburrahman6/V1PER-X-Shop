<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>

  <!-- ============================================================
       META
  ============================================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="V1PER X SHOP — Create your account" />
  <title>Register — V1PER X SHOP</title>

  <!-- ============================================================
       FONTS
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ============================================================
       STYLESHEET
       — Shared auth styles: auth-style.css
  ============================================================ -->
  <link rel="stylesheet" href="../assets/css/auth.css" />

</head>
<body>

  <!-- ============================================================
       ANIMATED BACKGROUND BLOBS
  ============================================================ -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>


  <!-- ============================================================
       PAGE HEADER
  ============================================================ -->
  <header class="page-header">

    <!-- Back to Home -->
    <a href="../index.html" class="back-link">
      <span class="back-arrow">←</span>
      Back to Shop
    </a>

    <!-- Center Logo -->
    <a href="../index.html" class="logo-link">
      <div class="logo-icon">🎮</div>
      <span>V1PER X SHOP</span>
    </a>

    <!-- Dark / Light Toggle -->
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>

  </header>


  <!-- ============================================================
       MAIN BODY — Register Card
  ============================================================ -->
  <main class="page-body">
    <div class="auth-wrapper">


      <!-- ── AUTH CARD ── -->
      <div class="auth-card" id="authCard">


        <!-- Card Header: Icon + Title + Subtitle -->
        <div class="card-head">
          <div class="card-head-icon">🎮</div>
          <h1 class="card-title">Create Account</h1>
          <p class="card-subtitle">
            Join <span class="highlight">V1PER X SHOP</span> today.<br/>
            Instant access to premium gaming tools.
          </p>
        </div>


        <!-- ── REGISTER FORM ── -->
        <form class="auth-form" id="registerForm" novalidate>

          <!-- Global Alert (success / error) -->
          <div class="auth-alert" id="authAlert"></div>


          <!-- Username Field -->
          <div class="form-group">
            <label class="form-label" for="regName">
              <span class="label-icon">👤</span> Username
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="text"
                id="regName"
                name="username"
                placeholder="Your gaming username"
                autocomplete="username"
                spellcheck="false"
                maxlength="30"
              />
              <span class="input-icon-btn" title="Clear" onclick="document.getElementById('regName').value=''; document.getElementById('regName').focus();">✕</span>
            </div>
            <div class="field-error"></div>
          </div>


          <!-- Email Field -->
          <div class="form-group">
            <label class="form-label" for="regEmail">
              <span class="label-icon">✉️</span> Email Address
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="email"
                id="regEmail"
                name="email"
                placeholder="your@email.com"
                autocomplete="email"
                spellcheck="false"
              />
              <span class="input-icon-btn" title="Clear" onclick="document.getElementById('regEmail').value=''; document.getElementById('regEmail').focus();">✕</span>
            </div>
            <div class="field-error"></div>
          </div>


          <!-- Password Field + Strength Meter -->
          <div class="form-group">
            <label class="form-label" for="regPassword">
              <span class="label-icon">🔒</span> Password
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="regPassword"
                name="password"
                placeholder="Min. 6 characters"
                autocomplete="new-password"
              />
              <span class="input-icon-btn" data-toggle-pw="regPassword" title="Show password">👁️</span>
            </div>
            <div class="field-error"></div>

            <!-- Password Strength Meter -->
            <div class="strength-wrap">
              <div class="strength-bars">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
              <span class="strength-text" id="strengthText"></span>
            </div>
          </div>


          <!-- Confirm Password Field -->
          <div class="form-group">
            <label class="form-label" for="regConfirm">
              <span class="label-icon">🔐</span> Confirm Password
            </label>
            <div class="input-wrapper">
              <input
                class="form-input"
                type="password"
                id="regConfirm"
                name="confirm_password"
                placeholder="Re-enter your password"
                autocomplete="new-password"
              />
              <span class="input-icon-btn" data-toggle-pw="regConfirm" title="Show password">👁️</span>
            </div>
            <div class="field-error"></div>
          </div>


          <!-- Terms & Conditions Checkbox -->
          <label class="terms-label" id="termsLabel">
            <input type="checkbox" id="termsCheck" />
            <span class="terms-box"></span>
            <span class="terms-text">
              I agree to the
              <a href="#" onclick="return false;">Terms of Service</a>
              &amp;
              <a href="#" onclick="return false;">Privacy Policy</a>
            </span>
          </label>
          <div class="field-error" id="termsError"></div>


          <!-- Register Submit Button -->
          <button type="submit" class="btn-submit btn-register" id="registerBtn">
            <span class="btn-text">🎮 Create Account</span>
            <span class="spinner"></span>
          </button>


          <!-- Divider -->
          <div class="auth-divider">or</div>


          <!-- Google Register -->
          <button type="button" class="btn-google">
            <div class="google-icon"></div>
            Continue with Google
          </button>


          <!-- Footer Links -->
          <div class="auth-footer">
            <p class="switch-text">
              Already have an account?
              <a href="login.html">Login here →</a>
            </p>
          </div>


        </form>
        <!-- END: REGISTER FORM -->


      </div>
      <!-- END: AUTH CARD -->


    </div>
  </main>


  <!-- Page Footer -->
  <footer class="page-footer">
    © 2026 <a href="../index.html">V1PER X SHOP</a> · All Rights Reserved
  </footer>


  <!-- ============================================================
       SHARED JS
  ============================================================ -->
  <script src="../assets/js/auth.js"></script>

</body>
</html>
